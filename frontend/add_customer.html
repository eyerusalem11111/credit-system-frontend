<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Customer</title>
</head>
<body style="margin:0; font-family:Arial, sans-serif; background:linear-gradient(135deg,#4facfe,#00f2fe);">

  <div style="margin:60px auto; width:350px; padding:20px; background:#fff; border-radius:8px; box-shadow:0 4px 8px rgba(0,0,0,0.2); text-align:center;">
    <h2 style="margin-bottom:20px; color:#333;">Add Customer</h2>
    <form action="../backend/add_customer.php" method="POST">
      <label for="name" style="display:block; text-align:left; margin-bottom:5px;">Name:</label>
      <input type="text" id="name" name="name" required style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px;">

      <label for="phone" style="display:block; text-align:left; margin-bottom:5px;">Phone:</label>
      <input type="text" id="phone" name="phone" required style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px;">

      <label for="email" style="display:block; text-align:left; margin-bottom:5px;">Email:</label>
      <input type="email" id="email" name="email" required style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px;">

      <label for="credit_limit" style="display:block; text-align:left; margin-bottom:5px;">Credit Limit:</label>
      <input type="number" id="credit_limit" name="credit_limit" required style="width:100%; padding:10px; margin-bottom:20px; border:1px solid #ccc; border-radius:4px;">

      <button type="submit" style="background:#0066cc; color:#fff; border:none; padding:12px; width:100%; border-radius:6px; cursor:pointer;">Add Customer</button>
    </form>
  </div>

  <footer style="margin-top:40px; padding:20px; text-align:center; background:rgba(0,0,0,0.3); color:#fff;">
    © 2026 Credit System Project
  </footer>

</body>
</html>
